<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Board</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .board {
      position: relative;
      width: 90vmin;
      max-width: 700px;
      overflow: hidden;
    }

    .board-image {
      width: 100%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .stone {
      position: absolute;
      width: 50px;
      height: 50px;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
    }

    .stone:active {
      cursor: grabbing;
    }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.7;
    }

    .back:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <a href="index.html" class="back">← Back</a>

  <div class="board" id="board">
    <img src="board.jpg" class="board-image" alt="Board">

    <img src="stone1.png" class="stone" draggable="false" style="left: 80px; top: 80px;">
    <img src="stone2.png" class="stone" draggable="false" style="left: 160px; top: 160px;">
  </div>

  <script>
    const board = document.getElementById("board");
    const stones = document.querySelectorAll(".stone");

    let activeStone = null;
    let offsetX = 0;
    let offsetY = 0;

    stones.forEach((stone) => {
      stone.addEventListener("mousedown", startDrag);
      stone.addEventListener("dragstart", (e) => e.preventDefault());
    });

    function startDrag(e) {
      e.preventDefault();

      activeStone = e.target;

      const rect = activeStone.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      activeStone.style.zIndex = "20";

      document.addEventListener("mousemove", moveStone);
      document.addEventListener("mouseup", stopDrag);
    }

    function moveStone(e) {
      if (!activeStone) return;

      const boardRect = board.getBoundingClientRect();

      let x = e.clientX - boardRect.left - offsetX;
      let y = e.clientY - boardRect.top - offsetY;

      x = Math.max(0, Math.min(x, boardRect.width - activeStone.offsetWidth));
      y = Math.max(0, Math.min(y, boardRect.height - activeStone.offsetHeight));

      activeStone.style.left = x + "px";
      activeStone.style.top = y + "px";
    }

    function stopDrag() {
      activeStone = null;

      document.removeEventListener("mousemove", moveStone);
      document.removeEventListener("mouseup", stopDrag);
    }
  </script>

</body>
</html>
