<script>
  const stones = document.querySelectorAll(".stone");
  const board = document.getElementById("board");

  stones.forEach((stone) => {
    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;

    stone.addEventListener("pointerdown", (e) => {
      dragging = true;

      const rect = stone.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      stone.setPointerCapture(e.pointerId);
    });

    stone.addEventListener("pointermove", (e) => {
      if (!dragging) return;

      const boardRect = board.getBoundingClientRect();

      let x = e.clientX - boardRect.left - offsetX;
      let y = e.clientY - boardRect.top - offsetY;

      // constrain inside board
      x = Math.max(0, Math.min(x, boardRect.width - stone.offsetWidth));
      y = Math.max(0, Math.min(y, boardRect.height - stone.offsetHeight));

      stone.style.left = `${x}px`;
      stone.style.top = `${y}px`;
    });

    stone.addEventListener("pointerup", () => {
      dragging = false;
    });
  });
</script>
